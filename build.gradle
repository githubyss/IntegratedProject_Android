// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext.KOTLIN_VERSION = '1.1.51'

    ext.GRADLE_VERSION = '3.0.1'
    ext.BUILD_TOOLS_VERSION = '26.0.2'

    ext.COMPILE_SDK_VERSION = 26
    ext.MIN_SDK_VERSION = 14
    ext.TARGET_SDK_VERSION = 26

    ext.ANDROID_SUPPORT_V7_VERSION = '26.1.0'

    ext.ANDROID_SUPPORT_MATERIAL_DESIGN_VERSION = '26.1.0'

    ext.AROUTER_API_VERSION = '1.3.1'
    ext.AROUTER_COMPILE_VERSION = '1.1.4'
    ext.AROUTER_ANNOTATION_VERSION = '1.0.4'
    ext.AROUTER_REGISTER_VERSION = '1.0.2'

    ext.VOLLEY_VERSION = '1.0.19'
    ext.HTTPCORE_VERSION = '4.4.9'
    ext.HTTPMIME_VERSION = '4.5.5'

    ext.JUNIT_VERSION = '4.12'
    ext.ANDROID_TEST_RUNNER_VERSION = '1.0.1'
    ext.ANDROID_TEST_ESPRESSO_CORE_VERSION = '3.0.1'

    repositories {
        google()
        jcenter()

//        maven { url '' }
//        maven { url '' }
    }

    dependencies {
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files

        classpath "com.android.tools.build:gradle:$GRADLE_VERSION"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$KOTLIN_VERSION"
        classpath "org.jetbrains.kotlin:kotlin-android-extensions:$KOTLIN_VERSION"
        classpath "com.neenbedankt.gradle.plugins:android-apt:1.8"
        classpath "com.alibaba:arouter-register:$AROUTER_REGISTER_VERSION"
    }
}

allprojects {
    repositories {
        google()
        jcenter()

//        maven { url '' }
//        maven { url '' }

        flatDir { dirs 'libs' }
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

// Global gradle variable definition
ext {
    gradleAuto = false
}
